# Harness testing stack.
#
# Brings up Redis (queue), Postgres (index), MinIO (object store) on
# localhost ports that match the default env in
# app/agents/harness/factory.py.
#
# Start:    docker compose -f docker-compose.harness.yml up -d
# Stop:     docker compose -f docker-compose.harness.yml down
# Logs:     docker compose -f docker-compose.harness.yml logs -f
#
# Production: the user wires real managed equivalents and sets the env
# vars below. Same code path either way.

services:
  redis:
    image: redis:7-alpine
    container_name: harness-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - harness_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: harness-postgres
    environment:
      POSTGRES_USER: configclaw
      POSTGRES_PASSWORD: configclaw
      POSTGRES_DB: configclaw
    ports:
      - "5432:5432"
    volumes:
      - harness_pg_data:/var/lib/postgresql/data
      # Auto-run the harness migration on first boot.
      - ./migrations/004_harness_tables.sql:/docker-entrypoint-initdb.d/004_harness_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U configclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: harness-minio
    environment:
      MINIO_ROOT_USER: configclaw
      MINIO_ROOT_PASSWORD: configclaw123
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - harness_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    # Creates the bucket the harness expects. Runs once and exits.
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: harness-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 configclaw configclaw123 &&
        mc mb --ignore-existing local/configclaw-harness &&
        echo "bucket ready"

  harness-app:
    # The self-improving harness AI itself: chat UI + queue-driven dispatcher.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harness-app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Localhost-only on the host side; uvicorn binds 0.0.0.0 inside the container.
    ports:
      - "127.0.0.1:8099:8099"
    environment:
      HARNESS_UI_HOST: "0.0.0.0"
      HARNESS_UI_PORT: "8099"
      # Backings: reach the sibling containers by service name.
      HARNESS_REDIS_URL: "redis://redis:6379"
      HARNESS_MINIO_ENDPOINT: "minio:9000"
      HARNESS_MINIO_ACCESS_KEY: "configclaw"
      HARNESS_MINIO_SECRET_KEY: "configclaw123"
      HARNESS_MINIO_BUCKET: "configclaw-harness"
      HARNESS_POSTGRES_DSN: "postgresql://configclaw:configclaw@postgres:5432/configclaw"
      # The LLM (Ollama) runs on the host, not in a container.
      HARNESS_LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      HARNESS_LLM_MODEL: "qwen3.5:latest"
      HARNESS_LLM_API_KEY: "local"
      HARNESS_USE_REAL_SCRAPER: "1"
    extra_hosts:
      # Lets the container reach the host's Ollama on Linux too (Docker Desktop
      # provides host.docker.internal automatically).
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind-mount source so generated tools + code edits persist without a rebuild.
      - .:/workspace
    restart: unless-stopped

volumes:
  harness_redis_data:
  harness_pg_data:
  harness_minio_data:

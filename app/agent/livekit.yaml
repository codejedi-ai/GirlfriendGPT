# Local LiveKit SFU (dev). Keys match LiveKit --dev defaults.
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
  # macOS Docker Desktop: advertise localhost so browser WebRTC works.
  node_ip: "127.0.0.1"
  enable_loopback_candidate: true

redis:
  address: redis:6379

keys:
  devkey: secret

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300
